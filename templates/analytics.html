<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="page-bg">
<div class="header header-center">
    <h2>Model Analytics Dashboard</h2>
</div>
<div class="page-container">
    <div class="grid">
        <div class="card">
            <h3>Age Distribution</h3>
            <canvas id="ageChart"></canvas>
        </div>
        <div class="card">
            <h3>Gender Distribution</h3>
            <canvas id="genderChart"></canvas>
        </div>
        <div class="card">
            <h3>Price Distribution</h3>
            <canvas id="priceChart"></canvas>
        </div>
        <div class="card">
            <h3>Cluster Distribution</h3>
            <canvas id="clusterChart"></canvas>
        </div>
        <div class="card wide-card">
            <h3>Age vs Price (Scatter)</h3>
            <canvas id="scatterChart"></canvas>
        </div>
        <div class="card">
            <h3>Age Histogram</h3>
            <canvas id="ageHist"></canvas>
        </div>
        <div class="card">
            <h3>Price Histogram</h3>
            <canvas id="priceHist"></canvas>
        </div>
    </div>
</div>
<div class="page-container">
    <h2>Reports Summary</h2>
    <div class="grid">
        <div class="card">
            <h3>Age Group Distribution</h3>
            <table id="ageTable"></table>
        </div>
        <div class="card">
            <h3>Gender Distribution</h3>
            <table id="genderTable"></table>
        </div>
        <div class="card">
            <h3>Price Group Distribution</h3>
            <table id="priceTable"></table>
        </div>
        <div class="card wide-card">
            <h3>Cluster Insights</h3>
            <table id="clusterTable"></table>
        </div>
    </div>
</div>
<script>
async function fetchData(url) {
    const res = await fetch(url);
    return await res.json();
}
function createChart(id, type, labels, data, label = "") {
    new Chart(document.getElementById(id), {
        type: type,
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: data
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: 10 }
        }
    });
}
function createHistogram(dataArray, binSize) {
    const bins = {};
    dataArray.forEach(val => {
        const bin = Math.floor(val / binSize) * binSize;
        bins[bin] = (bins[bin] || 0) + 1;
    });
    return bins;
}
const chartConfigs = [
    { url: '/api/age_distribution', id: 'ageChart', type: 'bar', label: 'Age Groups' },
    { url: '/api/gender_distribution', id: 'genderChart', type: 'pie', customLabels: ['Male','Female'] },
    { url: '/api/price_distribution', id: 'priceChart', type: 'bar', label: 'Price Groups' },
    { url: '/api/cluster_distribution', id: 'clusterChart', type: 'bar', label: 'Clusters' }
];
chartConfigs.forEach(c => {
    fetchData(c.url).then(data => {
        const labels = c.customLabels || Object.keys(data);
        const values = Object.values(data);
        createChart(c.id, c.type, labels, values, c.label);
    });
});
fetchData('/api/scatter_data').then(data => {
    const points = data.age.map((a, i) => ({
        x: a,
        y: data.price[i]
    }));
    new Chart(document.getElementById('scatterChart'), {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'Age vs Price',
                data: points
            }]
        },
        options: {
            scales: {
                x: { title: { display: true, text: 'Age' }},
                y: { title: { display: true, text: 'Price' }}
            }
        }
    });
});
fetchData('/api/histogram_data').then(data => {
    const ageBins = createHistogram(data.age, 5);
    createChart('ageHist', 'bar', Object.keys(ageBins), Object.values(ageBins), 'Age Frequency');
    const priceBins = createHistogram(data.price, 500);
    createChart('priceHist', 'bar', Object.keys(priceBins), Object.values(priceBins), 'Price Frequency');
});
function createTable(id, data) {
    let table = document.getElementById(id);
    if (id === "clusterTable") {
        let html = "<tr><th>Cluster</th><th>User Type</th></tr>";
        data.forEach(item => {
            html += `<tr>
                        <td>${item.cluster}</td>
                        <td>${item.type}</td>
                     </tr>`;
        });
        table.innerHTML = html;
    } 
    else {
        let html = "<tr><th>Category</th><th>Count</th></tr>";

        for (let key in data) {
            html += `<tr>
                        <td>${key}</td>
                        <td>${data[key]}</td>
                     </tr>`;
        }
        table.innerHTML = html;
    }
}
fetch('/api/table_data')
.then(res => res.json())
.then(data => {
    createTable("ageTable", data.age);
    createTable("genderTable", data.gender);
    createTable("priceTable", data.price);
});
fetch('/api/cluster_insights')
.then(res => res.json())
.then(data => {
    createTable("clusterTable", data);
});
</script>
</body>
</html>
