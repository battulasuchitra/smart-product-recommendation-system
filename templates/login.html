<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="app-bg">
    <div class="center-box">
        <h1>Smart Product Recommender</h1>
        <h2>User Login</h2>
        <form method="POST">
            <input class="input-field" type="text" name="user_id" placeholder="Enter User ID (e.g., UID00001)" required>
            <input class="input-field" type="password" name="password" placeholder="Enter Password" required>
            <button class="btn btn-primary" type="submit">Login</button>
        </form>
        <p class="link-text">Don't have an account?</p>
        <a href="/register">Register Here</a>
    </div>
</body>
</html>
